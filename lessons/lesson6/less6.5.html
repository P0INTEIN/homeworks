<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>form</title>
  <style>
    label{
      display: block;
      margin-top: 10px;
    }
    sup{
      color: red;
    }
    textarea{
      resize: none;

    }
    .form-register{
      border: 4px solid red;
      width: 40%;
      border-radius: 5px;
      padding: 10px;
    }
  </style>
</head>
<body>
<form class="form-register">
  <label for="name" >VRITE NAME</label>
  <input type="text" name="name" id="name" placeholder="Anna" required><sup>*</sup>

  <label for="email" >введіть свій email</label>
  <input type="email" name="email" id="email" placeholder="form@gmail.com" required><sup>*</sup>

  <label for="password" >введіть свій пароль</label>
  <input type="password" name="password" id="password" placeholder="2323Ww" required><sup>*</sup>

  <label for="age" >введіть свій вік</label>
  <input type="number" name="age" id="age" min="18">

  <label>стать</label>
  <label><input type="radio" name="gender" value="male">man</label>
  <label><input type="radio" name="gender" value="female">woman</label>

  <label>
    <input type="checkbox" name="newsletter"> subscribe
  </label>
  <label for="lorem">країна</label>
  <select id="lorem">
    <option value="">оберіть країну</option>
    <option value="ua">україна</option>
    <option value="usa">сша</option>
    <option value="ka">канада</option>
    <option value="mor">мороко</option>
  </select>

  <label for="phone"></label>
  <select id="phone">
    <optgroup label="apple">
      <option value="X">iphone X</option>
      <option value="XR">iphone XR</option>
      <option value="11">iphone 11</option>
    </optgroup>
    <optgroup label="honor">
      <option value="X">iphone X</option>
      <option value="XR">iphone XR</option>
      <option value="11">iphone 11</option>
    </optgroup>
  </select>

  <label for="comment"></label>
  <textarea id="comment" rows="4" cols="50">
  </textarea>

  <div>
    <input type="submit" value="надіслати">
    <input type="reset" value="скинути">
  </div>



</form>
</body>
</html>
